name: task_manager
description: "A Firebase-powered task management app built with BLoC and Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  shared_preferences: ^2.5.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: 10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true